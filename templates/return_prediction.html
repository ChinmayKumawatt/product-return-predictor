<!DOCTYPE html>
<html>
<head>

<title>Return Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(120deg,#89f7fe,#66a6ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#66a6ff;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#4c8df5;
}

</style>

</head>

<body>

<div class="card">

<h2>Return Prediction</h2>

<form action="/return" method="post">

<input name="Quantity" placeholder="Quantity">

<input name="Price" placeholder="Price">

<input name="Order_Value" placeholder="Order Value">

<input name="Invoice_Month" placeholder="Invoice Month">

<input name="Invoice_Day" placeholder="Invoice Day">

<input name="Country" placeholder="Country">

<button type="submit">Predict</button>

</form>

</div>

</body>
</html>
