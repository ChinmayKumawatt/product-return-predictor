<!DOCTYPE html>
<html>
<head>

<title>Customer Segmentation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#43cea2,#185a9d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:15px;
width:400px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#185a9d;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#124a84;
}

</style>

</head>

<body>

<div class="card">

<h2>Customer Segmentation</h2>

<form action="/segment" method="post">

<input name="Recency" placeholder="Recency">

<input name="Frequency" placeholder="Frequency">

<input name="Monetary" placeholder="Monetary">

<button type="submit">Predict Segment</button>

</form>

</div>

</body>
</html>
